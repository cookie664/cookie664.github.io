<!DOCTYPE html>
<html>
<head>
  <title>Socials</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at center, #0a0f2c, #020617);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 150px;
      font-size: 70px;
      text-shadow: 0 0 10px #fff;
    }

    /* Simple button style like Download page */
    .btn {
      display: inline-block;
      margin: 20px;
      padding: 15px 30px;
      font-size: 20px;
      border: 2px solid #00aaff;
      border-radius: 15px;
      color: #00aaff;
      text-decoration: none;
      background: transparent;
      transition: 0.3s;
      cursor: pointer;
    }

    .btn:hover {
      background: #00aaff;
      color: black;
    }

    /* Home button same style */
    .home-btn {
      display: inline-block;
      margin-top: 50px;
      padding: 12px 30px;
      font-size: 18px;
      border: 2px solid #00aaff;
      border-radius: 15px;
      color: #00aaff;
      text-decoration: none;
      background: transparent;
      transition: 0.3s;
    }

    .home-btn:hover {
      background: #00aaff;
      color: black;
    }
  </style>
</head>
<body>
  <h1>Socials</h1>

  <!-- YouTube (does nothing) -->
  <button class="btn">YouTube</button>

  <!-- TikTok (works) -->
  <a href="https://www.tiktok.com/@zinoraprojecthub" target="_blank">
    <button class="btn">TikTok</button>
  </a>

  <br>
  <a class="home-btn" href="index.html">Home</a>
</body>
</html>
