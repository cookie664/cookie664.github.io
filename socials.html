<!DOCTYPE html>
<html>
<head>
  <title>Socials</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at center, #0a0f2c, #020617);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 150px;
      font-size: 70px;
      text-shadow: 0 0 15px #fff;
    }

    .social-btn {
      display: inline-block;
      margin: 20px;
      padding: 15px 40px;
      font-size: 22px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      color: white;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
    }

    .social-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px #fff;
    }

    .youtube {
      background: linear-gradient(135deg, #ff0000, #ffffff);
      color: black;
      box-shadow: 0 0 15px #ff0000, 0 0 25px #ffffff;
    }

    .tiktok {
      background: linear-gradient(135deg, #ff0050, #00f2ea);
      color: white;
      box-shadow: 0 0 15px #ff0050, 0 0 25px #00f2ea;
    }

    .home-btn {
      background: linear-gradient(135deg, #ff00ff, #00ffff);
      color: white;
      box-shadow: 0 0 15px #ff00ff, 0 0 25px #00ffff;
      padding: 12px 30px;
      margin-top: 50px;
      display: inline-block;
      border-radius: 15px;
      text-decoration: none;
    }

    .home-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px #fff;
    }
  </style>
</head>
<body>
  <h1>Socials</h1>

  <!-- YouTube (does nothing for now) -->
  <button class="social-btn youtube">YouTube</button>

  <!-- TikTok (works) -->
  <a href="https://www.tiktok.com/@zinoraprojecthub" target="_blank">
    <button class="social-btn tiktok">TikTok</button>
  </a>

  <br>
  <a class="home-btn" href="index.html">Home</a>
</body>
</html>
